<template>
    <lightning-card title="Historial de Etapas" icon-name="standard:opportunity">
        <div class="slds-card__body slds-card__body_inner timeline-container">
            <template if:true={hasData}>
                <ul class="timeline-list">
                    <template for:each={timelineData} for:item="item">
                        <li key={item.id} class={item.cssClass}>
                            <div class="timeline-bullet">
                                <lightning-icon
                                    icon-name={item.icon}
                                    size="x-small"
                                    class="timeline-icon">
                                </lightning-icon>
                            </div>
                            <div class="timeline-content">
                                <p class="timeline-stage">{item.stage}</p>
                                <p class="timeline-date">{item.date}</p>
                            </div>
                        </li>
                    </template>
                </ul>
            </template>
            <template if:false={hasData}>
                <p class="slds-text-color_weak slds-p-around_small">No hay historial de etapas disponible.</p>
            </template>
            <template if:true={error}>
                <p class="slds-text-color_error slds-p-around_small">Error al cargar el historial.</p>
            </template>
        </div>
    </lightning-card>
</template>
